<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Chainshot — Disc Golf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="app">
    <header class="brand-bar">
      <p class="brand">Chainshot</p>
      <p class="hole">Hole 1 · Pin 18m</p>
    </header>

    <canvas id="stage"></canvas>

    <div id="hands" aria-hidden="true">
      <div class="arm left"></div>
      <div class="arm right"></div>
      <div id="held-disc"></div>
    </div>

    <div id="power-meter" hidden>
      <div id="power-fill"></div>
    </div>

    <p id="hint">Pull back, then push forward and release</p>

    <div id="result" hidden>
      <p id="result-title"></p>
      <p id="result-sub"></p>
      <button type="button" id="again">Throw again</button>
    </div>

    <footer class="score-bar">
      <span>Made <strong id="made">0</strong></span>
      <span>Missed <strong id="missed">0</strong></span>
    </footer>
  </div>
  <script type="module" src="game.js"></script>
</body>
</html>
